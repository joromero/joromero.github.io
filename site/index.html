<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="description" content="FFXIV tools and notes." />
  <title>joromero.github.io</title>
  <style>
    :root {
      --bg: #0f1419;
      --surface: #1a2332;
      --border: #2d3a4d;
      --text: #e7ecf3;
      --muted: #8b9cb3;
      --accent: #c9a227;
      --font: "Segoe UI", system-ui, sans-serif;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: var(--font);
      background: var(--bg);
      color: var(--text);
      line-height: 1.55;
      min-height: 100vh;
    }
    .wrap {
      max-width: 40rem;
      margin: 0 auto;
      padding: 2.5rem 1.25rem 4rem;
    }
    h1 {
      font-size: 1.5rem;
      font-weight: 600;
      margin: 0 0 0.35rem;
      letter-spacing: 0.02em;
    }
    .lead {
      color: var(--muted);
      font-size: 0.95rem;
      margin: 0 0 2rem;
    }
    h2 {
      font-size: 0.75rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--muted);
      margin: 0 0 0.75rem;
    }
    ul {
      list-style: none;
      margin: 0;
      padding: 0;
    }
    li {
      margin: 0;
    }
    a.card {
      display: block;
      padding: 1rem 1.15rem;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: inherit;
      text-decoration: none;
      transition: border-color 0.15s ease, background 0.15s ease;
    }
    a.card:hover {
      border-color: var(--accent);
      background: #1e2838;
    }
    a.card:focus-visible {
      outline: 2px solid var(--accent);
      outline-offset: 2px;
    }
    a.card strong {
      display: block;
      font-size: 1rem;
      color: var(--accent);
      margin-bottom: 0.25rem;
    }
    a.card span {
      font-size: 0.88rem;
      color: var(--muted);
    }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>Welcome</h1>
    <p class="lead">Static pages hosted on GitHub Pages.</p>

    <h2>Pages</h2>
    <ul>
      <li>
        <a class="card" href="irregulars/aphorism.html">
          <strong>Irregular Tomestones of Aphorism — Rewards</strong>
          <span>Browse event rewards, mark what you want and own, and tally Irregular Tomestones of Aphorism. Data loads from JSON; choices stay in your browser.</span>
        </a>
      </li>
    </ul>
  </div>
</body>
</html>
